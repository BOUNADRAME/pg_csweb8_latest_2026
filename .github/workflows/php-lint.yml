name: PHP Code Quality

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check PHP syntax
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors"

      - name: PHP Code Statistics
        continue-on-error: true
        run: |
          echo "PHP Code Statistics:"
          echo "Total PHP files: $(find . -name '*.php' -not -path './vendor/*' | wc -l)"
          echo "Total PHP lines: $(find . -name '*.php' -not -path './vendor/*' -exec wc -l {} + | tail -1 | awk '{print $1}')"

  security-check:
    name: Security Vulnerabilities Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Check for security vulnerabilities
        run: |
          if [ -f composer.lock ]; then
            composer audit
          else
            echo "No composer.lock found, skipping security check"
          fi

  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, pdo_pgsql, mbstring, xml, intl, json
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit

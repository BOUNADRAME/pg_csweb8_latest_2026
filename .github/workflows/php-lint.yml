name: PHP Code Quality

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/php-lint.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'
      - '.github/workflows/php-lint.yml'
  workflow_dispatch:

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-all

      - name: Check PHP syntax
        run: |
          echo "Checking PHP syntax..."
          error_found=0
          while IFS= read -r file; do
            output=$(php -l "$file" 2>&1)
            if ! echo "$output" | grep -q "No syntax errors"; then
              echo "$output"
              error_found=1
            fi
          done < <(find . -name "*.php" -not -path "./vendor/*")
          if [ "$error_found" -eq 1 ]; then
            echo "::error::PHP syntax errors found"
            exit 1
          fi
          echo "All PHP files have valid syntax."

      - name: PHP Code Statistics
        continue-on-error: true
        run: |
          echo "PHP Code Statistics:"
          echo "Total PHP files: $(find . -name '*.php' -not -path './vendor/*' | wc -l)"
          echo "Total PHP lines: $(find . -name '*.php' -not -path './vendor/*' -exec wc -l {} + | tail -1 | awk '{print $1}')"

  security-check:
    name: Security Vulnerabilities Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Check for security vulnerabilities
        continue-on-error: true
        run: |
          if [ -f composer.lock ]; then
            composer audit --no-dev || true
          else
            echo "No composer.lock found, skipping security check"
          fi

  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, pdo_pgsql, mbstring, xml, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit --do-not-cache-result

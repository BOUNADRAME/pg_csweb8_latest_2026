name: PHP Code Quality

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'src/**'

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict || true
        continue-on-error: true

      - name: Check PHP syntax
        run: |
          echo "🔍 Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors"
        continue-on-error: true

      - name: PHP Code Statistics
        run: |
          echo "📊 PHP Code Statistics:"
          echo "Total PHP files: $(find . -name '*.php' -not -path './vendor/*' | wc -l)"
          echo "Total PHP lines: $(find . -name '*.php' -not -path './vendor/*' -exec wc -l {} + | tail -1 | awk '{print $1}')"

  security-check:
    name: Security Vulnerabilities Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest || true
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: |
          if [ -f composer.lock ]; then
            composer audit || echo "⚠️  Some security advisories found (non-blocking)"
          else
            echo "No composer.lock found, skipping security check"
          fi
        continue-on-error: true

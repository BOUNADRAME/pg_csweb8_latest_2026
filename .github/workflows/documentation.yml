name: Documentation Check

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.md'
      - 'docs/**'

jobs:
  markdown-lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint '**/*.md' --ignore node_modules --config .markdownlint.json || true
        continue-on-error: true

      - name: Check for broken links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

  documentation-stats:
    name: Documentation Statistics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Count documentation files
        run: |
          echo "📊 Documentation Statistics:"
          echo "Total Markdown files: $(find . -name '*.md' | wc -l)"
          echo "Total lines in docs: $(find docs -name '*.md' -exec wc -l {} + | tail -1 | awk '{print $1}')"
          echo "Documentation size: $(du -sh docs/ | cut -f1)"

      - name: List all documentation
        run: |
          echo "📁 Documentation Structure:"
          tree docs/ -L 3 || find docs/ -type f -name '*.md'

name: Documentation Check

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.md'
      - 'docs/**'

jobs:
  markdown-lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint '**/*.md' --ignore node_modules --config .markdownlint.json || true
        continue-on-error: true

  documentation-stats:
    name: Documentation Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Count documentation files
        run: |
          echo "📊 Documentation Statistics:"
          echo "Total Markdown files: $(find . -name '*.md' -not -path './node_modules/*' | wc -l)"
          echo "Total lines in docs: $(find docs -name '*.md' -exec wc -l {} + 2>/dev/null | tail -1 | awk '{print $1}' || echo '0')"
          echo "Documentation size: $(du -sh docs/ 2>/dev/null | cut -f1 || echo 'N/A')"

      - name: List all documentation
        run: |
          echo "📁 Documentation Structure:"
          find docs/ -type f -name '*.md' | sort

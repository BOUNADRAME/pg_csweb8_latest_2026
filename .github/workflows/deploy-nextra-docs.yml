name: Deploy Nextra Documentation to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'docs-nextra/**'
      - '.github/workflows/deploy-nextra-docs.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs-nextra/**'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    name: Build Nextra Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'docs-nextra/package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        working-directory: ./docs-nextra
        run: npm ci

      - name: Build Next.js site
        working-directory: ./docs-nextra
        run: npm run build
        env:
          NODE_ENV: production

      - name: Export static site
        working-directory: ./docs-nextra
        run: |
          # Next.js standalone output
          echo "Build completed successfully!"
          ls -lah .next/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-nextra/out

  # Deployment job (only on push to master)
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "✅ Nextra Documentation deployed successfully!"
          echo "📖 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🕒 Deployed at: $(date)"

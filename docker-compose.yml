version: '3.8'

# ============================================================================
# CSWeb Community Platform - Flexible Docker Compose Configuration
# ============================================================================
# Author: Bouna DRAME
# Date: 14 Mars 2026
# Version: 2.0.0
#
# ARCHITECTURE FLEXIBLE:
#   - Mode LOCAL: Docker containers pour DB breakout
#   - Mode REMOTE: Connexion à serveur distant
#   - Support: PostgreSQL, MySQL, SQL Server
#
# MODES:
#   1. Local PostgreSQL:  docker-compose --profile local-postgres up -d
#   2. Local MySQL:       docker-compose --profile local-mysql up -d
#   3. Local SQL Server:  docker-compose --profile local-sqlserver up -d
#   4. Remote (any):      docker-compose up -d csweb mysql
#
# ============================================================================

services:
  # ==========================================================================
  # CSWeb Application (PHP 8.1 + Apache + TOUS les drivers)
  # ==========================================================================
  csweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csweb-app
    restart: unless-stopped

    ports:
      - "${CSWEB_PORT:-8080}:80"

    volumes:
      - csweb_files:/var/www/html/files
      - csweb_logs:/var/www/html/var/logs
      # Templates for envsubst (processed at startup by docker-entrypoint.sh)
      - ./docker/apache/000-default.conf:/etc/templates/000-default.conf:ro
      - ./docker/apache/mpm_prefork.conf:/etc/templates/mpm_prefork.conf:ro
      - ./docker/php/php.ini:/etc/templates/csweb.ini:ro

    environment:
      # Application
      - APP_ENV=${APP_ENV:-prod}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}

      # Breakout Configuration (ESSENTIEL)
      - BREAKOUT_MODE=${BREAKOUT_MODE:-local}
      - BREAKOUT_DB_TYPE=${BREAKOUT_DB_TYPE:-postgresql}

      # MySQL Métadonnées CSWeb (TOUJOURS LOCAL)
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}

      # PostgreSQL Breakout (si BREAKOUT_DB_TYPE=postgresql)
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # MySQL Breakout (si BREAKOUT_DB_TYPE=mysql)
      - MYSQL_BREAKOUT_HOST=${MYSQL_BREAKOUT_HOST}
      - MYSQL_BREAKOUT_PORT=${MYSQL_BREAKOUT_PORT:-3306}
      - MYSQL_BREAKOUT_DATABASE=${MYSQL_BREAKOUT_DATABASE}
      - MYSQL_BREAKOUT_USER=${MYSQL_BREAKOUT_USER}
      - MYSQL_BREAKOUT_PASSWORD=${MYSQL_BREAKOUT_PASSWORD}

      # SQL Server Breakout (si BREAKOUT_DB_TYPE=sqlserver)
      - SQLSERVER_HOST=${SQLSERVER_HOST}
      - SQLSERVER_PORT=${SQLSERVER_PORT:-1433}
      - SQLSERVER_DATABASE=${SQLSERVER_DATABASE}
      - SQLSERVER_USER=${SQLSERVER_USER}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}

      # Performance Tuning - PHP
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - PHP_MAX_INPUT_TIME=${PHP_MAX_INPUT_TIME:-300}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-100M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-100M}
      - PHP_SESSION_GC_MAXLIFETIME=${PHP_SESSION_GC_MAXLIFETIME:-7200}
      - PHP_OPCACHE_MEMORY=${PHP_OPCACHE_MEMORY:-128}
      - PHP_OPCACHE_MAX_FILES=${PHP_OPCACHE_MAX_FILES:-10000}

      # Performance Tuning - Apache
      - APACHE_MAX_REQUEST_WORKERS=${APACHE_MAX_REQUEST_WORKERS:-150}
      - APACHE_SERVER_LIMIT=${APACHE_SERVER_LIMIT:-150}
      - APACHE_KEEP_ALIVE_TIMEOUT=${APACHE_KEEP_ALIVE_TIMEOUT:-5}
      - APACHE_MAX_KEEP_ALIVE_REQUESTS=${APACHE_MAX_KEEP_ALIVE_REQUESTS:-100}
      - APACHE_TIMEOUT=${APACHE_TIMEOUT:-300}

    depends_on:
      - mysql

    networks:
      - csweb-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "com.csweb.service=application"
      - "com.csweb.version=2.0.0"
      - "com.csweb.drivers=mysql,postgresql,sqlserver"

  # ==========================================================================
  # MySQL 8.0 (CSWeb Metadata - TOUJOURS LOCAL - OBLIGATOIRE)
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: csweb-mysql-metadata
    restart: unless-stopped

    ports:
      - "${MYSQL_PORT:-3306}:3306"

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${APP_TIMEZONE:-UTC}

    volumes:
      - mysql_metadata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/csweb.cnf:ro

    command:
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-200}
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
      - --innodb-log-file-size=${MYSQL_INNODB_LOG_FILE_SIZE:-64M}
      - --max-allowed-packet=${MYSQL_MAX_ALLOWED_PACKET:-64M}
      - --thread-cache-size=${MYSQL_THREAD_CACHE_SIZE:-16}
      - --table-open-cache=${MYSQL_TABLE_OPEN_CACHE:-2000}
      - --wait-timeout=${MYSQL_WAIT_TIMEOUT:-28800}
      - --long-query-time=${MYSQL_SLOW_QUERY_TIME:-2}
      - --log-bin-trust-function-creators=1

    networks:
      - csweb-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    labels:
      - "com.csweb.service=mysql-metadata"
      - "com.csweb.role=metadata"
      - "com.csweb.required=true"

  # ==========================================================================
  # PostgreSQL 16 (Breakout - CONDITIONNEL - Mode Local uniquement)
  # Profile: local-postgres
  # ==========================================================================
  postgres:
    image: postgres:16
    container_name: csweb-postgres-breakout
    restart: unless-stopped

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=${APP_TIMEZONE:-UTC}

    volumes:
      - postgres_breakout:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    command:
      - postgres
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-200}
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}

    networks:
      - csweb-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    profiles:
      - local-postgres

    labels:
      - "com.csweb.service=postgres-breakout"
      - "com.csweb.role=breakout"
      - "com.csweb.mode=local"

  # ==========================================================================
  # MySQL 8.0 Breakout (CONDITIONNEL - Mode Local uniquement)
  # Profile: local-mysql
  # ==========================================================================
  mysql-breakout:
    image: mysql:8.0
    container_name: csweb-mysql-breakout
    restart: unless-stopped

    ports:
      - "${MYSQL_BREAKOUT_PORT:-3307}:3306"

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_BREAKOUT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_BREAKOUT_DATABASE}
      - MYSQL_USER=${MYSQL_BREAKOUT_USER}
      - MYSQL_PASSWORD=${MYSQL_BREAKOUT_PASSWORD}
      - TZ=${APP_TIMEZONE:-UTC}

    volumes:
      - mysql_breakout:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/csweb.cnf:ro

    networks:
      - csweb-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_BREAKOUT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    profiles:
      - local-mysql

    labels:
      - "com.csweb.service=mysql-breakout"
      - "com.csweb.role=breakout"
      - "com.csweb.mode=local"

  # ==========================================================================
  # SQL Server 2022 (CONDITIONNEL - Mode Local uniquement)
  # Profile: local-sqlserver
  # ==========================================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: csweb-sqlserver-breakout
    restart: unless-stopped

    ports:
      - "${SQLSERVER_PORT:-1433}:1433"

    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQLSERVER_PASSWORD}
      - MSSQL_PID=Developer
      - TZ=${APP_TIMEZONE:-UTC}

    volumes:
      - sqlserver_breakout:/var/opt/mssql

    networks:
      - csweb-network

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQLSERVER_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    profiles:
      - local-sqlserver

    labels:
      - "com.csweb.service=sqlserver-breakout"
      - "com.csweb.role=breakout"
      - "com.csweb.mode=local"

  # ==========================================================================
  # phpMyAdmin (Optionnel - Développement)
  # Profile: dev
  # ==========================================================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: csweb-phpmyadmin
    restart: unless-stopped

    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"

    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - UPLOAD_LIMIT=100M

    depends_on:
      - mysql

    networks:
      - csweb-network

    profiles:
      - dev

    labels:
      - "com.csweb.service=phpmyadmin"
      - "com.csweb.environment=development"

  # ==========================================================================
  # pgAdmin (Optionnel - Développement)
  # Profile: dev
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: csweb-pgadmin
    restart: unless-stopped

    ports:
      - "${PGADMIN_PORT:-8082}:80"

    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@csweb.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
      - PGADMIN_CONFIG_SERVER_MODE=False

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - csweb-network

    profiles:
      - dev

    labels:
      - "com.csweb.service=pgadmin"
      - "com.csweb.environment=development"

# ============================================================================
# Volumes (Persistent Storage)
# ============================================================================
volumes:
  csweb_files:
    driver: local
    labels:
      - "com.csweb.volume=files"

  csweb_logs:
    driver: local
    labels:
      - "com.csweb.volume=logs"

  mysql_metadata:
    driver: local
    labels:
      - "com.csweb.volume=mysql-metadata"
      - "com.csweb.role=metadata"

  postgres_breakout:
    driver: local
    labels:
      - "com.csweb.volume=postgres-breakout"
      - "com.csweb.role=breakout"

  mysql_breakout:
    driver: local
    labels:
      - "com.csweb.volume=mysql-breakout"
      - "com.csweb.role=breakout"

  sqlserver_breakout:
    driver: local
    labels:
      - "com.csweb.volume=sqlserver-breakout"
      - "com.csweb.role=breakout"

  pgadmin_data:
    driver: local
    labels:
      - "com.csweb.volume=pgadmin"

# ============================================================================
# Networks (Isolation)
# ============================================================================
networks:
  csweb-network:
    driver: bridge
    labels:
      - "com.csweb.network=main"

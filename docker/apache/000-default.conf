# ============================================================================
# CSWeb Community Platform - Apache VirtualHost (envsubst template)
# ============================================================================
# Variables are substituted at container startup via docker-entrypoint.sh

Timeout ${APACHE_TIMEOUT}
KeepAlive On
KeepAliveTimeout ${APACHE_KEEP_ALIVE_TIMEOUT}
MaxKeepAliveRequests ${APACHE_MAX_KEEP_ALIVE_REQUESTS}

<VirtualHost *:80>
    ServerAdmin admin@csweb.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Enable URL rewriting
        RewriteEngine On

        # Redirect to setup if config.php doesn't exist
        RewriteCond %{REQUEST_URI} !^/setup
        RewriteCond %{DOCUMENT_ROOT}/src/AppBundle/config.php !-f
        RewriteRule ^(.*)$ /setup/ [R=302,L]
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/csweb-error.log
    CustomLog ${APACHE_LOG_DIR}/csweb-access.log combined

    # PHP configuration
    php_value upload_max_filesize ${PHP_UPLOAD_MAX_FILESIZE}
    php_value post_max_size ${PHP_POST_MAX_SIZE}
    php_value max_execution_time ${PHP_MAX_EXECUTION_TIME}
    php_value memory_limit ${PHP_MEMORY_LIMIT}
</VirtualHost>

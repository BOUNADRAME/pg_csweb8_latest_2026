# ============================================================================
# CSWeb Community Platform - Apache MPM Prefork (envsubst template)
# ============================================================================
# Variables are substituted at container startup via docker-entrypoint.sh

<IfModule mpm_prefork_module>
    StartServers          5
    MinSpareServers       5
    MaxSpareServers       10
    MaxRequestWorkers     ${APACHE_MAX_REQUEST_WORKERS}
    ServerLimit           ${APACHE_SERVER_LIMIT}
    MaxConnectionsPerChild 10000
</IfModule>

; ============================================================================
; CSWeb Community Platform - PHP Configuration (envsubst template)
; ============================================================================
; Variables are substituted at container startup via docker-entrypoint.sh

[PHP]
; Error handling
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/www/html/var/logs/php-error.log

; Resource limits
memory_limit = ${PHP_MEMORY_LIMIT}
max_execution_time = ${PHP_MAX_EXECUTION_TIME}
max_input_time = ${PHP_MAX_INPUT_TIME}

; File uploads
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE}
post_max_size = ${PHP_POST_MAX_SIZE}
file_uploads = On

; Timezone
date.timezone = UTC

; Session
session.save_handler = files
session.save_path = "/tmp"
session.gc_maxlifetime = ${PHP_SESSION_GC_MAXLIFETIME}

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

[opcache]
opcache.enable = 1
opcache.memory_consumption = ${PHP_OPCACHE_MEMORY}
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = ${PHP_OPCACHE_MAX_FILES}
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
